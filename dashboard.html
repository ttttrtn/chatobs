<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamChat — Dashboard</title>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>
  <div class="dash-wrap">
    <header class="dash-header">
      <div class="dash-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">StreamChat</span>
        <span class="logo-sub">Overlay</span>
      </div>
      <div class="dash-status-bar">
        <span class="status-dot" id="ws-status-dot"></span>
        <span id="ws-status-label">Connecting…</span>
        <span class="sep">•</span>
        <span id="msg-count">0 messages</span>
      </div>
    </header>

    <main class="dash-main">
      <!-- Left panel: Platform adapters -->
      <section class="panel adapters-panel">
        <h2 class="panel-title">Platforms</h2>
        <div class="adapter-list" id="adapter-list">
          <!-- Generated by JS -->
        </div>
      </section>

      <!-- Center panel: Live preview -->
      <section class="panel preview-panel">
        <h2 class="panel-title">
          Live Preview
          <span class="preview-badge">OBS Source URL: <code id="obs-url"></code></span>
        </h2>
        <div class="preview-frame-wrap">
          <iframe id="preview-frame" src="/" title="Chat Preview"></iframe>
        </div>
      </section>

      <!-- Right panel: Controls + recent -->
      <section class="panel controls-panel">
        <h2 class="panel-title">Quick Controls</h2>

        <div class="control-group">
          <label>YouTube Video ID</label>
          <div class="input-row">
            <input type="text" id="yt-video-id" placeholder="e.g. dQw4w9WgXcQ" />
            <button onclick="updateYouTube()">Update</button>
          </div>
        </div>

        <div class="control-group">
          <label>Twitch Channel</label>
          <div class="input-row">
            <input type="text" id="twitch-channel" placeholder="channel name" />
            <button onclick="startTwitch()">Connect</button>
          </div>
        </div>

        <div class="control-group">
          <label>Kick Channel</label>
          <div class="input-row">
            <input type="text" id="kick-channel" placeholder="channel name" />
            <button onclick="startKick()">Connect</button>
          </div>
        </div>

        <div class="control-group">
          <label>Rumble Stream URL</label>
          <div class="input-row">
            <input type="text" id="rumble-url" placeholder="https://rumble.com/v..." />
            <button onclick="startRumble()">Connect</button>
          </div>
        </div>

        <hr class="divider" />

        <h2 class="panel-title">Recent Messages</h2>
        <div class="recent-feed" id="recent-feed">
          <div class="empty-state">Waiting for messages…</div>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
