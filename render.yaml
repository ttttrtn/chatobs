services:
  - type: web
    name: streamchat-overlay
    env: python
    # Pin to Python 3.12 — all C-extension dependencies (playwright/greenlet,
    # lxml, etc.) ship pre-built wheels for 3.12. Python 3.14 breaks several.
    pythonVersion: "3.12.9"
    buildCommand: >-
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      playwright install chromium &&
      playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: YOUTUBE_VIDEO_ID
        sync: false
      - key: TWITCH_CHANNEL
        sync: false
      - key: TWITCH_OAUTH_TOKEN
        sync: false
      - key: KICK_CHANNEL
        sync: false
      - key: RUMBLE_STREAM_URL
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_VIDEO_ID
        sync: false
      - key: INSTAGRAM_ENABLED
        value: "false"
      - key: IG_LIVE_URL
        sync: false
      - key: IG_SESSION_COOKIE
        sync: false
      - key: IG_USERNAME
        sync: false
      - key: IG_PASSWORD
        sync: false
      - key: INSTAGRAM_MOCK_MODE
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
